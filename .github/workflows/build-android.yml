# ⚠️ 수정금지(승인필요): 2026-03-22 GitHub Actions Android AAB 빌드
# EAS 클라우드 쿼터 소진 시 대안 — Public repo = 무제한 무료
# 실행: GitHub → Actions 탭 → "Build Android AAB" → "Run workflow"
name: Build Android AAB

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS Build Profile'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        working-directory: mobile-app
        run: npm ci

      - name: Build Android AAB locally
        working-directory: mobile-app
        run: eas build --local --platform android --profile ${{ github.event.inputs.profile }} --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ github.run_number }}
          path: mobile-app/build-*.aab
          if-no-files-found: warn
