<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>손안의 가이드 - 베타 테스터 참여 / Join Beta Testers</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%234285F4'><path d='M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z'/></svg>">
    <meta name="theme-color" content="#1a73e8"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://hangeul.pstatic.net">
    <link rel="stylesheet" href="https://hangeul.pstatic.net/maruburi/maruburi.css">
    <style>
        html, body {
            font-family: 'MaruBuri', sans-serif;
            background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .btn-google {
            background: white;
            border: 2px solid #dadce0;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .btn-google:hover {
            background: #f8f9fa;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .btn-install {
            background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
            transition: opacity 0.2s;
        }
        .btn-install:hover { opacity: 0.9; }
        .btn-install-green {
            background: linear-gradient(135deg, #34a853 0%, #1e7e34 100%);
            transition: opacity 0.2s;
        }
        .btn-install-green:hover { opacity: 0.9; }
        .btn-web {
            background: #f1f3f4;
            color: #444;
            transition: background 0.2s;
        }
        .btn-web:hover { background: #e2e5e9; }
        .benefit-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 10px 0;
        }
        .benefit-icon {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            color: #1a73e8;
            margin-top: 1px;
        }
        .screen-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 12px;
        }
        .lang-btn {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lang-btn.active {
            background: #1a73e8;
            color: white;
        }
        .lang-btn:not(.active) {
            background: #f1f3f4;
            color: #555;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #e8f0fe;
            border-top-color: #1a73e8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center p-4 py-8">
    <div class="card w-full max-w-md p-8">

        <div class="flex justify-end mb-4 gap-2">
            <button class="lang-btn" id="btnEn" onclick="setLang('en')">English</button>
            <button class="lang-btn" id="btnKo" onclick="setLang('ko')">한국어</button>
        </div>

        <div class="text-center mb-6">
            <svg class="screen-icon text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/>
            </svg>
            <h1 class="text-2xl font-bold text-gray-800 mb-1" id="txt-title"></h1>
            <p class="text-gray-500 text-sm" id="txt-subtitle"></p>
        </div>

        <div id="screen-landing">
            <h2 class="text-3xl font-extrabold text-center text-blue-700 mb-5 leading-tight tracking-tight" id="txt-headline"></h2>

            <div class="bg-blue-50 border border-blue-200 rounded-2xl p-5 mb-6">
                <p class="font-bold text-blue-800 text-sm mb-3" id="txt-invite-title"></p>
                <div class="space-y-1">
                    <div class="benefit-item">
                        <svg class="benefit-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21 11.25v8.25a1.5 1.5 0 0 1-1.5 1.5H5.25a1.5 1.5 0 0 1-1.5-1.5v-8.25M12 4.875A2.625 2.625 0 1 0 9.375 7.5H12m0-2.625V7.5m0-2.625A2.625 2.625 0 1 1 14.625 7.5H12m0 0V21m-8.625-9.75h18c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125h-18c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z"/>
                        </svg>
                        <p class="text-gray-700 text-sm" id="txt-benefit1"></p>
                    </div>
                    <div class="benefit-item">
                        <svg class="benefit-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 1.5H8.25A2.25 2.25 0 0 0 6 3.75v16.5a2.25 2.25 0 0 0 2.25 2.25h7.5A2.25 2.25 0 0 0 18 20.25V3.75a2.25 2.25 0 0 0-2.25-2.25H13.5m-3 0V3h3V1.5m-3 0h3m-3 18.75h3"/>
                        </svg>
                        <p class="text-gray-700 text-sm" id="txt-benefit2"></p>
                    </div>
                    <div class="benefit-item">
                        <svg class="benefit-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5"/>
                        </svg>
                        <p class="text-gray-700 text-sm" id="txt-benefit3"></p>
                    </div>
                </div>
            </div>

            <button onclick="loginWithGoogle()"
                class="btn-google w-full py-4 px-6 rounded-xl font-bold text-gray-800 text-base flex items-center justify-center gap-3 mb-3 shadow-sm">
                <svg class="w-6 h-6" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span id="txt-google-btn"></span>
            </button>

            <div class="relative my-4">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200"></div>
                </div>
                <div class="relative flex justify-center">
                    <span class="px-3 bg-white text-xs text-gray-400" id="txt-or"></span>
                </div>
            </div>

            <a href="https://My-handyguide1.replit.app"
               class="btn-web block w-full py-3 px-6 rounded-xl font-bold text-sm text-center">
                <span id="txt-web-btn"></span>
            </a>

            <p class="text-center text-xs text-gray-400 mt-4" id="txt-terms"></p>
        </div>

        <div id="screen-processing" class="hidden text-center py-8">
            <div class="spinner mx-auto mb-4"></div>
            <p class="text-gray-600 font-bold" id="txt-processing"></p>
        </div>

        <div id="screen-success" class="hidden">
            <div class="text-center mb-6">
                <svg class="screen-icon text-green-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
                </svg>
                <h2 class="text-xl font-bold text-gray-800 mb-1" id="txt-success-title"></h2>
            </div>

            <div class="bg-green-50 border border-green-200 rounded-2xl p-5 mb-4">
                <p class="font-bold text-green-800 text-sm mb-2" id="txt-credit-granted"></p>
                <p class="text-green-700 text-sm" id="txt-credit-desc"></p>
            </div>

            <div class="bg-blue-50 border border-blue-200 rounded-2xl p-5 mb-5">
                <p class="font-bold text-blue-800 text-sm mb-3" id="txt-steps-title"></p>
                <p class="text-gray-700 text-sm mb-2" id="txt-step1"></p>
                <p class="text-gray-700 text-sm" id="txt-step2"></p>
            </div>

            <a href="https://groups.google.com/g/dbstour"
               target="_blank"
               class="btn-install block w-full py-4 px-6 rounded-2xl text-white font-bold text-base text-center shadow-lg mb-3">
                <span id="txt-group-btn"></span>
            </a>

            <a href="https://play.google.com/apps/testing/com.sonanie.guide"
               target="_blank"
               class="btn-install-green block w-full py-4 px-6 rounded-2xl text-white font-bold text-base text-center shadow-lg mb-3">
                <span id="txt-install-btn"></span>
            </a>

            <a href="https://My-handyguide1.replit.app"
               class="btn-web block w-full py-3 px-6 rounded-xl font-bold text-sm text-center">
                <span id="txt-web-start-btn"></span>
            </a>
        </div>

        <div id="screen-already" class="hidden">
            <div class="text-center mb-6">
                <svg class="screen-icon text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 0 1-1.043 3.296 3.745 3.745 0 0 1-3.296 1.043A3.745 3.745 0 0 1 12 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 0 1-3.296-1.043 3.745 3.745 0 0 1-1.043-3.296A3.745 3.745 0 0 1 3 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 0 1 1.043-3.296 3.746 3.746 0 0 1 3.296-1.043A3.746 3.746 0 0 1 12 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 0 1 3.296 1.043 3.746 3.746 0 0 1 1.043 3.296A3.745 3.745 0 0 1 21 12Z"/>
                </svg>
                <p class="font-bold text-gray-800 mb-2" id="txt-already-title"></p>
                <p class="text-gray-500 text-sm mb-4" id="txt-already-desc"></p>
            </div>

            <a href="https://groups.google.com/g/dbstour"
               target="_blank"
               class="btn-install block w-full py-4 px-6 rounded-2xl text-white font-bold text-base text-center shadow-lg mb-3">
                <span id="txt-already-group-btn"></span>
            </a>

            <a href="https://play.google.com/apps/testing/com.sonanie.guide"
               target="_blank"
               class="btn-install-green block w-full py-4 px-6 rounded-2xl text-white font-bold text-base text-center shadow-lg mb-3">
                <span id="txt-already-install-btn"></span>
            </a>

            <a href="https://My-handyguide1.replit.app"
               class="btn-web block w-full py-3 px-6 rounded-xl font-bold text-sm text-center">
                <span id="txt-already-web-btn"></span>
            </a>
        </div>

        <div id="screen-error" class="hidden text-center py-6">
            <svg class="screen-icon text-amber-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"/>
            </svg>
            <p class="font-bold text-gray-800 mb-2" id="txt-error-title"></p>
            <p class="text-gray-500 text-sm mb-6" id="txt-error-desc"></p>
            <button onclick="showScreen('landing')"
                class="btn-install block w-full py-4 px-6 rounded-2xl text-white font-bold text-base text-center shadow-lg">
                <span id="txt-retry-btn"></span>
            </button>
        </div>

    </div>

    <script>
        const STRINGS = {
            ko: {
                title: '손안의 가이드',
                subtitle: 'AI가 만들어주는 나만의 여행 가이드',
                headline: '1분만 도와주세요!',
                inviteTitle: '곧 Google Play Store에 정식 출시됩니다!',
                benefit1: '무료 100 크레딧 즉시 지급 — 지금 바로 웹에서 사용 가능',
                benefit2: '구글 그룹 가입 후 Android 비공개 테스트 앱 먼저 체험',
                benefit3: '앱 설치 후 14일간 유지해주시면 정식 출시에 큰 도움이 됩니다',
                googleBtn: '안드로이드폰으로 시작하기',
                or: '또는',
                webBtn: '아이폰으로 시작하기',
                terms: '로그인 시 위치정보, 사진 정보 사용에 동의합니다',
                processing: '등록 중...',
                successTitle: '등록 완료!',
                creditGranted: '100 크레딧이 지급되었습니다',
                creditDesc: '앱 정식 출시 전에도 지금 바로 웹에서 AI 여행가이드를 사용하실 수 있습니다!',
                stepsTitle: '아래 순서대로 진행해주세요 (Android 전용)',
                step1: '1단계: 아래 파란 버튼 클릭 → 구글 그룹에 가입',
                step2: '2단계: 그룹 가입 완료 후 초록 버튼 클릭 → 앱 설치',
                groupBtn: '1단계: 구글 그룹 가입하기',
                installBtn: '2단계: 비공개 테스트 앱 설치하기 (Android)',
                webStartBtn: '지금 웹에서 시작하기',
                alreadyTitle: '이미 등록되어 있습니다',
                alreadyDesc: '아래 순서대로 그룹 가입 후 앱을 설치하세요',
                alreadyGroupBtn: '1단계: 구글 그룹 가입하기',
                alreadyInstallBtn: '2단계: 비공개 테스트 앱 설치하기 (Android)',
                alreadyWebBtn: '웹에서 시작하기',
                errorTitle: '오류가 발생했습니다',
                errorDesc: '잠시 후 다시 시도해주세요',
                retryBtn: '다시 시도',
            },
            en: {
                title: 'My Hand Guide',
                subtitle: 'AI-powered personalized travel guide',
                headline: 'Please help us for 1 minute!',
                inviteTitle: 'Coming soon to Google Play Store!',
                benefit1: '100 free credits instantly — usable right now on the web',
                benefit2: 'Join Google Group then get early access to the Android beta app',
                benefit3: 'Please keep the app for 14 days after install — it helps a lot!',
                googleBtn: 'Start on Android',
                or: 'or',
                webBtn: 'Start on iPhone',
                terms: 'By signing in, you agree to location and photo data usage',
                processing: 'Registering...',
                successTitle: 'You\'re in!',
                creditGranted: '100 credits have been added to your account',
                creditDesc: 'You can start using the AI travel guide on the web right now — no need to wait for the official launch!',
                stepsTitle: 'Please follow these steps (Android only)',
                step1: 'Step 1: Click the blue button below → Join the Google Group',
                step2: 'Step 2: After joining, click the green button → Install the app',
                groupBtn: 'Step 1: Join Google Group',
                installBtn: 'Step 2: Install Beta App (Android)',
                webStartBtn: 'Start on Web Now',
                alreadyTitle: 'Already registered!',
                alreadyDesc: 'Join the group first, then install the app below',
                alreadyGroupBtn: 'Step 1: Join Google Group',
                alreadyInstallBtn: 'Step 2: Install Beta App (Android)',
                alreadyWebBtn: 'Start on Web',
                errorTitle: 'Something went wrong',
                errorDesc: 'Please try again in a moment',
                retryBtn: 'Try again',
            }
        };

        let currentLang = 'ko';

        function detectLang() {
            const nav = navigator.language || '';
            return nav.startsWith('ko') ? 'ko' : 'en';
        }

        function setLang(lang) {
            currentLang = lang;
            const s = STRINGS[lang];
            document.getElementById('txt-title').textContent = s.title;
            document.getElementById('txt-subtitle').textContent = s.subtitle;
            document.getElementById('txt-headline').textContent = s.headline;
            document.getElementById('txt-invite-title').textContent = s.inviteTitle;
            document.getElementById('txt-benefit1').textContent = s.benefit1;
            document.getElementById('txt-benefit2').textContent = s.benefit2;
            document.getElementById('txt-benefit3').textContent = s.benefit3;
            document.getElementById('txt-google-btn').textContent = s.googleBtn;
            document.getElementById('txt-or').textContent = s.or;
            document.getElementById('txt-web-btn').textContent = s.webBtn;
            document.getElementById('txt-terms').textContent = s.terms;
            document.getElementById('txt-processing').textContent = s.processing;
            document.getElementById('txt-success-title').textContent = s.successTitle;
            document.getElementById('txt-credit-granted').textContent = s.creditGranted;
            document.getElementById('txt-credit-desc').textContent = s.creditDesc;
            document.getElementById('txt-steps-title').textContent = s.stepsTitle;
            document.getElementById('txt-step1').textContent = s.step1;
            document.getElementById('txt-step2').textContent = s.step2;
            document.getElementById('txt-group-btn').textContent = s.groupBtn;
            document.getElementById('txt-install-btn').textContent = s.installBtn;
            document.getElementById('txt-web-start-btn').textContent = s.webStartBtn;
            document.getElementById('txt-already-title').textContent = s.alreadyTitle;
            document.getElementById('txt-already-desc').textContent = s.alreadyDesc;
            document.getElementById('txt-already-group-btn').textContent = s.alreadyGroupBtn;
            document.getElementById('txt-already-install-btn').textContent = s.alreadyInstallBtn;
            document.getElementById('txt-already-web-btn').textContent = s.alreadyWebBtn;
            document.getElementById('txt-error-title').textContent = s.errorTitle;
            document.getElementById('txt-error-desc').textContent = s.errorDesc;
            document.getElementById('txt-retry-btn').textContent = s.retryBtn;
            document.getElementById('btnKo').classList.toggle('active', lang === 'ko');
            document.getElementById('btnEn').classList.toggle('active', lang === 'en');
        }

        function showScreen(name) {
            ['landing','processing','success','already','error'].forEach(s => {
                document.getElementById('screen-' + s).classList.add('hidden');
            });
            document.getElementById('screen-' + name).classList.remove('hidden');
        }

        function loginWithGoogle() {
            const width = 500, height = 600;
            const left = Math.round((screen.width - width) / 2);
            const top = Math.round((screen.height - height) / 2);
            const popup = window.open(
                '/api/auth/google',
                'google_oauth',
                `width=${width},height=${height},left=${left},top=${top},toolbar=no,menubar=no,scrollbars=yes`
            );
            if (!popup || popup.closed) {
                window.location.href = '/api/auth/google';
            }
        }

        async function registerAndShowSuccess() {
            showScreen('processing');
            try {
                const res = await fetch('/api/beta/play-register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lang: currentLang }),
                });
                const data = await res.json();
                if (data.alreadyRegistered) {
                    showScreen('already');
                } else {
                    showScreen('success');
                }
            } catch (e) {
                showScreen('success');
            }
        }

        window.addEventListener('message', (event) => {
            if (event.origin !== window.location.origin) return;
            if (event.data?.type === 'oauth_success') {
                registerAndShowSuccess();
            }
        });

        async function init() {
            const lang = detectLang();
            setLang(lang);

            try {
                const authRes = await fetch('/api/auth/user');
                if (authRes.ok) {
                    registerAndShowSuccess();
                    return;
                }
            } catch (e) {}

            showScreen('landing');
        }

        init();
    </script>
</body>
</html>
